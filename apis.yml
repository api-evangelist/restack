aid: restack
name: Restack
description: >-
  Restack is an enterprise AI agent platform and backend framework for building
  accurate, reliable, and scalable AI products. It provides durable workflow
  orchestration, long-running agent execution, and infrastructure for deploying
  AI agents at enterprise scale using Python and Kubernetes.
