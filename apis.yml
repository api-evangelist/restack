    name: Restack
    description: >-
      Restack is an enterprise AI agent platform that provides long-running
      workflow orchestration, durable execution, and infrastructure for building
      and deploying AI agents. It generates REST API endpoints for each agent
      and workflow, enabling programmatic triggering, scheduling, and management
      of AI agents from any client application.
